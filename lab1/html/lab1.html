<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/design.css">
    <title>Resistetion</title>
</head>
<body>
    <div id="container" class="container">
    <fieldset id="studentInfo" class="studentInfo">
        <legend>Student Information</legend>
       <div class="name_email">
             <div id="name" class="name">
                <p>Full Name(Text)</p>
                <input id="name_input" class="name_input" type="text" placeholder="Enter your full name">
            </div>
        
            <div id="email" class="email">
                <p>Email Address</p>
                <input id="email_input" class="email_input" type="email" placeholder="your.email@example.com">
            </div>
        </div>
        <div class="password_age">
            <div id="password" class="password">
                <p>password</p>
                <input id="password_input" class="password_input" type="password" placeholder="Enter your password">
            </div>
            <div id="age" class="age">
                <p>Age (Number)</p>
                <input id="age_input" class="age_input" type="number" placeholder="Enter your age">
            </div>
        </div>    
        <div class="date_phone">
            <div id="experimentDate" class="experimentDate">
                <p>Experiment Date</p>
                <input id="experimentDate_input" class="experimentDate_input" type="date">
            </div>
            <div id="phoneNumber" class="phoneNumber">
                <p>Phone Number</p>
                <input id="phoneNumber_input" class="phoneNumber_input" type="number" placeholder="+880 XXXX XXXXXX">
            </div>
        </div>    
    </fieldset>
    <div id="button" class="button">
        <button id="submit" class="submit">SUBMIT</button>
        <button id="clear" class="clear">CLEAR</button>
    </div>
    </div>
    
</body>
</html>
