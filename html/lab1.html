<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title> Signup </title>
    </head>
    <body>

        <h1> Patient Registartion Form </h1>
        
        <form>
            <table> 
                <tr>
                    <td> <label for="Patient"> Patient Name:  </label>  </td>
                    <td> <input type ="text" id="PatientName" name="PatientName" placeholder="Enter Your Name"> </td>
                </tr>
                <tr>
                    <td><label for="Age"> Patient Age:  </label></td>
                    <td><input type ="number" id="PatientAge" name="PatientAge"></td>
                </tr>
                <tr>
                    <td><label for="Email"> Patient Email:  </label> </td>
                    <td><input type ="email" id="PatientEmail" name="PatientEmail"> </td>
                </tr>
                <tr> 
                    <td><label for="Gender"> Patient Gender:  </label> </td>
                    <td><input type ="radio" id="PatientMale" name="PatientMale" value="Male"> Male </td>
                    <td><input type ="radio" id="PatientFemale" name="PatientFemale" value="Female"> Female </td>
                </tr>

                <tr>
                    <td><label for="File"> Patient Prescription:  </label> </td>
                    <td><input type ="file" id="PatientFile" name="PatientFile"></td>
                </tr>

                <tr>
                    <td><label for="DOB"> Patient DOB:  </label> </td>
                    <td><input type ="date" id="DOB" name="DOB"></td>
                </tr>

                <tr>
                <td><label for="Address"> Patient Address:  </label> </td>
                <td> <textarea id="Address" name ="Address" rows="5" cols="10"> </textarea></td>
                </tr>

                <tr> 
                   <td><input type = "submit" id="submit" name ="submit" value = Signup></td> 
                </tr>
                


            </table>
        </form>
